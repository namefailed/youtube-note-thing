name: Release

# Tag a version (e.g. v0.1.0) and push it to build, sign, and draft a GitHub
# release with the installer + updater artifacts (latest.json). Requires the
# signing secrets below — see RELEASING.md.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign). Generate with `npm run tauri signer generate`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Optional: bundle the app's default Google OAuth client (build.rs reads these).
          YTNT_GOOGLE_CLIENT_ID: ${{ secrets.YTNT_GOOGLE_CLIENT_ID }}
          YTNT_GOOGLE_CLIENT_SECRET: ${{ secrets.YTNT_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "youtube-note-thing ${{ github.ref_name }}"
          releaseBody: "Download the installer below. Auto-update is delivered via latest.json."
          releaseDraft: true
          prerelease: false
